name: LLMOps CI — Evaluation Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Lint & Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt

      - name: Check config
        run: python -c "import config; print('✅ config OK')"

      - name: Check dataset builder
        run: python -c "from src.data.dataset_builder import _get_sample_dataset; print('✅ dataset_builder OK')"

      - name: Check evaluator
        run: python -c "from src.evaluation.evaluator import run_evaluation; print('✅ evaluator OK')"

      - name: Check eval gate
        run: python -c "from src.evaluation.eval_gate import run_gate; print('✅ eval_gate OK')"

      - name: Check metrics
        run: python -c "from src.monitoring.metrics import record_request; print('✅ metrics OK')"

      - name: Check API schemas
        run: python -c "from src.serving.api import GenerateRequest, GenerateResponse; print('✅ API schemas OK')"

  evaluation-gate:
    name: Evaluation Gate
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt

      - name: Build sample dataset
        run: python src/data/dataset_builder.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Run evaluation in mock mode
        run: python src/evaluation/evaluator.py --mock --samples 10
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Run evaluation gate
        run: python src/evaluation/eval_gate.py --results-file eval_results.json
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Upload gate results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: |
            eval_results.json
            gate_result.json

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t llmops-api .